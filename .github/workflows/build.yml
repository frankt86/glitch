name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  # ── Release build + installers ───────────────────────────────────────────
  build:
    name: Build (Windows x64)
    runs-on: windows-latest
    needs: test
    permissions:
      contents: write   # required to upload release assets

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p glitch

      - name: Build Inno Setup installer (GlitchSetup.exe)
        shell: pwsh
        run: |
          winget install --id JRSoftware.InnoSetup --silent --accept-source-agreements --accept-package-agreements
          $iscc = "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          & $iscc packaging\inno\glitch.iss

      - name: Package MSIX
        shell: pwsh
        env:
          MSIX_CERT_PFX: ${{ secrets.MSIX_CERT_PFX }}
          MSIX_CERT_PASSWORD: ${{ secrets.MSIX_CERT_PASSWORD }}
        run: .\packaging\msix\build-msix.ps1 -SkipBuild

      # Upload artifacts on every successful build.
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlitchSetup
          path: target/GlitchSetup.exe
          if-no-files-found: error

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: glitch-windows-x64-exe
          path: target/release/glitch.exe
          if-no-files-found: error

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: glitch-windows-x64-msix
          path: target/glitch.msix
          if-no-files-found: error

      # When triggered by a GitHub Release, attach all three to the release.
      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/GlitchSetup.exe
            target/release/glitch.exe
            target/glitch.msix
