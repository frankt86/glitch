name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  # ── Release build ─────────────────────────────────────────────────────────
  build:
    name: Build (Windows x64)
    runs-on: windows-latest
    needs: test
    permissions:
      contents: write   # required to upload release assets

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p glitch

      # Upload as a workflow artifact on every successful build.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glitch-windows-x64
          path: target/release/glitch.exe
          if-no-files-found: error

      # When triggered by a GitHub Release, also attach the binary to it.
      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/glitch.exe
